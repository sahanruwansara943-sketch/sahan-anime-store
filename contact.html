<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Sahan Anime Store</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- 1. මූලික පසුබිම (Liquid Wave Gradient) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff7979, #ea2027, #06b6d4, #4f46e5);
            background-size: 400% 400%;
            animation: waveAnimation 15s ease infinite;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            padding-top: 20px;
        }

        @keyframes waveAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 2. LIQUID GLASS NAVIGATION BAR --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 15px 4%;
            width: 88%;
            max-width: 1300px;
            margin: 0 auto 40px auto;
            border-radius: 50px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .logo span {
            color: #ff4757;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            align-items: center;
        }

        nav ul li {
            margin: 0 14px;
        }

        nav ul li a {
            color: #ffffff !important;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            opacity: 0.9;
            transition: all 0.3s ease;
        }

        nav ul li a:hover, nav ul li a.active {
            opacity: 1;
            color: #ff4757 !important;
        }

        .register-btn {
            background: #ff4757 !important;
            color: #ffffff !important;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        /* --- 3. CONTACT CONTENT CONTAINER --- */
        .contact-section {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 4% 60px 4%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* උඩින් තියෙන Info Cards 3 (Row එකක් විදිහට) */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            width: 100%;
            margin-bottom: 35px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 25px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }

        /* Icons Styles */
        .info-card i {
            font-size: 26px;
            margin-bottom: 12px;
            display: block;
        }
        .icon-wa { color: #25D366; }
        .icon-mail { color: #ff4757; }
        .icon-fb { color: #1877F2; }

        .info-card h4 {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 6px;
        }

        .info-card p {
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
        }

        /* --- 4. SEND A MESSAGE FORM CARD --- */
        .message-box {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 35px;
            padding: 40px;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .message-box h2 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .message-box h2 span {
            color: #ff4757;
        }

        /* Form Controls */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 700;
            opacity: 0.8;
            margin-bottom: 8px;
            display: block;
            padding-left: 5px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 14px 18px;
            font-size: 14px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .form-group textarea {
            height: 120px;
            resize: none;
        }

        /* Send Message Button */
        .send-btn {
            background: #ff4757;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 15px 0;
            font-size: 15px;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.6);
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav ul { display: none; }
            .message-box { padding: 30px 20px; }
            .message-box h2 { font-size: 26px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Sahan <span>Anime</span></div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="series.html">Series</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="login.html">Sign In</a></li>
            <li><a href="register.html" class="register-btn">Register</a></li>
        </ul>
    </nav>

    <section class="contact-section">
        
        <div class="info-grid">
            <div class="info-card">
                <i class="fa-brands fa-whatsapp icon-wa"></i>
                <h4>Whatsapp / Call</h4>
                <p>0775138905</p>
            </div>
            <div class="info-card">
                <i class="fa-solid fa-envelope icon-mail"></i>
                <h4>Gmail Address</h4>
                <p>sahanruwansara757@gmail.com</p>
            </div>
            <div class="info-card">
                <i class="fa-brands fa-facebook icon-fb"></i>
                <h4>Facebook</h4>
                <p>Sahan Ruwansara</p>
            </div>
        </div>

        <div class="message-box">
            <h2>Send A <span>Message</span></h2>
            
            <form action="#">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label>Your Message</label>
                    <textarea placeholder="Type your message here..." required></textarea>
                </div>
                
                <button type="submit" class="send-btn">Send Message</button>
            </form>
        </div>

    </section>

</body>
</html>
