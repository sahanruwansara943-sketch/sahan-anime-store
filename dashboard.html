<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard - Sahan Anime Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #ff7979, #ea2027, #06b6d4, #4f46e5);
            background-size: 400% 400%; animation: waveAnimation 15s ease infinite;
            min-height: 100vh; color: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
        }
        @keyframes waveAnimation { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .upload-card {
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 35px;
            padding: 40px; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }
        h2 span { color: #ff4757; }
        p { font-size: 14px; opacity: 0.7; margin-bottom: 30px; }
        
        .file-box {
            border: 2px dashed rgba(255,255,255,0.3); padding: 30px; border-radius: 20px;
            cursor: pointer; margin-bottom: 20px; background: rgba(255,255,255,0.02);
        }
        .file-box:hover { border-color: #ff4757; background: rgba(255,255,255,0.05); }
        input[type="file"] { display: none; }
        
        .upload-btn {
            background: #ff4757; color: white; border: none; width: 100%; padding: 14px;
            font-size: 16px; font-weight: 700; border-radius: 15px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4); transition: 0.3s;
        }
        .upload-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,71,87,0.6); }
        
        .preview-img { width: 100%; max-height: 250px; border-radius: 15px; object-fit: cover; display: none; margin-top: 15px; }
        .logout { margin-top: 20px; color: white; opacity: 0.6; text-decoration: none; font-size: 13px; }
        .logout:hover { opacity: 1; color: #ff4757; }
    </style>
</head>
<body>

    <div class="upload-card">
        <h2>Welcome <span>Anime Fan!</span></h2>
        <p>Upload your favorite Anime Art or Photos to Sahan Cloud Store</p>
        
        <div class="file-box" onclick="document.getElementById('animeFile').click()">
            <span id="uploadText">📸 Click here to select Anime Photo</span>
            <input type="file" id="animeFile" accept="image/*">
            <img id="imagePreview" class="preview-img">
        </div>

        <button class="upload-btn" id="uploadBtn">Upload to Cloud</button>
        <br>
        <a href="login.html" class="logout">← Sign Out</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // උඹේ Firebase Config විස්තර
        const firebaseConfig = {
            apiKey: "AIzaSyBc6Wq-S7viTy7TSp2hUdp1-iAu-OAPeY",
            authDomain: "sahan-anime-store.firebaseapp.com",
            projectId: "sahan-anime-store",
            storageBucket: "sahan-anime-store.firebasestorage.app",
            messagingSenderId: "180534262856",
            appId: "1:180534262856:web:6315761c2d6bebb7b6ac7d",
            measurementId: "G-KS4Y949RZF"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        const fileInput = document.getElementById('animeFile');
        const preview = document.getElementById('imagePreview');
        const uploadText = document.getElementById('uploadText');

        // ෆොටෝ එකක් තෝරපුවම ප්ලෙවීව් එකක් පෙන්වන කොටස
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    uploadText.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // ෆොටෝ එක Firebase Storage එකට අප්ලෝඩ් කරන බටන් එක
        document.getElementById('uploadBtn').addEventListener('click', function() {
            const file = fileInput.files[0];
            if (!file) {
                alert('Please select a photo first!');
                return;
            }

            // ෆොටෝ එකට යුනික් නමක් දෙනවා වෙලාවත් එක්ක
            const storageRef = ref(storage, 'anime_uploads/' + Date.now() + '_' + file.name);

            alert('Uploading... Please wait.');

            uploadBytes(storageRef, file).then((snapshot) => {
                getDownloadURL(snapshot.ref).then((downloadURL) => {
                    alert('Anime Photo Uploaded Successfully to Firebase! 🚀');
                    console.log('File available at:', downloadURL);
                    // මෙතනින් පස්සේ ඕන නම් මේ URL එක Database එකටත් යවන්න පුළුවන්
                });
            }).catch((error) => {
                alert('Upload Failed: ' + error.message);
            });
        });
    </script>
</body>
</html>
