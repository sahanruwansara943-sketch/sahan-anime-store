<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Sahan Anime Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: '-apple-system', BlinkMacSystemFont, sans-serif; }
        body {
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920&auto=format&fit=crop'); 
            background-size: cover; background-repeat: no-repeat; background-attachment: fixed; background-position: center;
            min-height: 100vh; color: #fff; display: flex; flex-direction: column;
        }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background-color: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px 50px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 24px; font-weight: 800; }
        .logo span { color: #ff4757; text-shadow: 0 0 20px rgba(255, 71, 71, 0.6); }
        .nav-links { display: flex; list-style: none; align-items: center; }
        .nav-links li { margin-left: 30px; }
        .nav-links a { color: rgba(255, 255, 255, 0.9); text-decoration: none; font-size: 15px; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: #ff4757; }
        
        .gallery-section { flex: 1; padding: 60px 20px; max-width: 1200px; width: 90%; margin: 0 auto; text-align: center; }
        .gallery-section h1 { font-size: 42px; font-weight: 800; margin-bottom: 40px; }
        .gallery-section h1 span { color: #ff4757; text-shadow: 0 0 30px rgba(255, 71, 87, 0.7); }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .gallery-card {
            background-color: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px; padding: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); transition: 0.3s; text-align: center;
        }
        .gallery-card:hover { transform: translateY(-5px); border-color: #ff4757; }
        .img-container { width: 100%; height: 240px; border-radius: 14px; overflow: hidden; margin-bottom: 12px; background: rgba(0,0,0,0.1); }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .gallery-card:hover .img-container img { transform: scale(1.05); }
        .gallery-card h3 { font-size: 16px; font-weight: 700; color: rgba(255, 255, 255, 0.9); }
    </style>
</head>
