<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahan Anime Store - Gallery</title>
    
    <style>
        /* --- 1. මූලික පසුබිම (Liquid Wave Gradient) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff7979, #ea2027, #06b6d4, #4f46e5);
            background-size: 400% 400%;
            animation: waveAnimation 15s ease infinite;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            padding-top: 20px;
        }

        @keyframes waveAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 2. LIQUID GLASS NAVIGATION BAR --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 15px 4%;
            width: 88%;
            max-width: 1300px;
            margin: 0 auto 60px auto;
            border-radius: 50px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .logo span {
            color: #ff4757;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            align-items: center;
        }

        nav ul li {
            margin: 0 14px;
        }

        nav ul li a {
            color: #ffffff !important;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            opacity: 0.9;
            transition: all 0.3s ease;
        }

        nav ul li a:hover, nav ul li a.active {
            opacity: 1;
            color: #ff4757 !important;
        }

        .register-btn {
            background: #ff4757 !important;
            color: #ffffff !important;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        /* --- 3. ANIME ART GALLERY CONTENT AREA --- */
        .gallery-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 4% 60px 4%;
            text-align: center;
        }

        /* Heading Style */
        .gallery-section h1 {
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 50px;
            letter-spacing: -0.5px;
        }

        .gallery-section h1 span {
            color: #ff4757; /* Gallery කෑල්ල විතරක් රතු පාටින් */
        }

        /* Gallery Grid (Row එකකට 4 ගානේ හැදෙන විදිහට) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            width: 100%;
        }

        /* Gallery Card Item */
        .gallery-item {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 14px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* කාඩ් එක උඩට මවුස් එක ගෙනිච්චම පොඩ්ඩක් Zoom වෙලා ඉස්සෙන ලස්සන ඉෆෙක්ට් එක */
        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.25);
        }

        /* Image එක එකම කොටුවකට Crop වෙලා ලස්සනට තියෙන්න */
        .img-container {
            width: 100%;
            height: 250px; /* උස සමානව තියාගන්න */
            overflow: hidden;
            border-radius: 24px;
        }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.08); /* හොවර් කරද්දී ඉමේජ් එක විතරක් පොඩ්ඩක් Zoom වෙනවා */
        }

        /* යටින් තියෙන Glass Title Bar එක */
        .art-title {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
        }

        /* Hover කරද්දී Title Bar එකත් Glow වෙන්න */
        .gallery-item:hover .art-title {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* Responsive Settings */
        @media (max-width: 968px) {
            nav ul { display: none; }
            .gallery-section h1 { font-size: 38px; }
            .img-container { height: 220px; }
        }
    </style>
</head>
