<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Sahan Anime Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: '-apple-system', BlinkMacSystemFont, sans-serif; }
        body {
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920&auto=format&fit=crop'); 
            background-size: cover; background-repeat: no-repeat; background-attachment: fixed; background-position: center;
            min-height: 100vh; color: #fff; display: flex; flex-direction: column;
        }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background-color: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 20px 50px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 24px; font-weight: 800; }
        .logo span { color: #ff4757; text-shadow: 0 0 20px rgba(255, 71, 87, 0.6); }
        .nav-links { display: flex; list-style: none; align-items: center; }
        .nav-links li { margin-left: 30px; }
        .nav-links a { color: rgba(255, 255, 255, 0.9); text-decoration: none; font-size: 15px; font-weight: 600; }
        .gallery-section { flex: 1; padding: 60px 20px; max-width: 1200px; width: 90%; margin: 0 auto; text-align: center; }
        .gallery-section h1 { font-size: 42px; font-weight: 800; margin-bottom: 40px; }
        .gallery-section h1 span { color: #ff4757; text-shadow: 0 0 30px rgba(255, 71, 87, 0.7); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .gallery-card {
            background-color: rgba(255, 255, 255, 0.04); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px; padding: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .gallery-card:hover { transform: translateY(-5px); border-color: #ff4757; }
        .img-container { width: 100%; height: 200px; border-radius: 16px; overflow: hidden; margin-bottom: 15px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-card h3 { font-size: 18px; font-weight: 700; color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Sahan <span>Anime</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="series.html">Series</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    <div class="gallery-section">
        <h1>Anime Art <span>Gallery</span></h1>
        <div class="gallery-grid">
            <div class="gallery-card">
                <div class="img-container"><img src="sahan.jpg.jpg" alt="Art 1"></div>
                <h3>Sahan Special Edit</h3>
            </div>
            <div class="gallery-card">
                <div class="img-container"><img src="anime-guy-sunglasses-4k-wallpaper-uhdpaper.com-232@5@p.jpg" alt="Art 2"></div>
                <h3>Retro Sunglasses Guy</h3>
            </div>
            <div class="gallery-card">
                <div class="img-container"><img src="anime-girl-katana-white-hair-4k-wallpaper-uhdpaper.com-21@2@b.jpg" alt="Art 3"></div>
                <h3>White Hair Katana Girl</h3>
            </div>
            <div class="gallery-card">
                <div class="img-container"><img src="cat-night-scenery-pixel-art-digital-art-4k-wallpaper-uhdpaper.com-41@2@b.jpg" alt="Art 4"></div>
                <h3>Pixel Cat Night Scenery</h3>
            </div>
            <div class="gallery-card">
                <div class="img-container"><img src="lofi-anime-girl-cat-chill-headphone-4k-wallpaper-uhdpaper.com-76@2@b.jpg" alt="Art 5"></div>
                <h3>Lofi Chill Girl</h3>
            </div>
        </div>
    </div>
</body>
</html>
