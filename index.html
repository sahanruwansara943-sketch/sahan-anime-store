<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Sahan Anime Store</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: '-apple-system', BlinkMacSystemFont, sans-serif; 
        }
        
        body {
            /* මෙතනට උඹේ පරණ Torii Gate Anime ෆොටෝ එක සෙට් කරා මචං */
            background-image: url(nayom.jpg);
            background-size: cover; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            background-position: center;
            min-height: 100vh; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden;
        }

        .navbar {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            padding: 20px 50px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }

        .logo { 
            font-size: 24px; 
            font-weight: 800; 
        }

        .logo span { 
            color: #ff4757; 
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.6); 
        }

        .nav-links { 
            display: flex; 
            list-style: none; 
            align-items: center; 
        }

        .nav-links li { 
            margin-left: 30px; 
        }

        .nav-links a { 
            color: rgba(255, 255, 255, 0.9); 
            text-decoration: none; 
            font-size: 15px; 
            font-weight: 600; 
            transition: 0.3s; 
        }

        .nav-links a:hover { 
            color: #ff4757; 
        }

        .hero { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 60px 20px; 
            text-align: center; 
        }

        /* මැද තියෙන බොක්ස් එක පට්ට Premium Glass ලුක් එකකට හැදුවා */
        .hero-box {
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px) saturate(150%); 
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 30px; 
            padding: 60px; 
            max-width: 800px; 
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); 
        }

        .hero h1 { 
            font-size: 55px; 
            font-weight: 900; 
            margin-bottom: 25px; 
            letter-spacing: -1px; 
        }

        .hero h1 span { 
            color: #ff4757; 
            text-shadow: 0 0 30px rgba(255, 71, 87, 0.6); 
        }

        .explore-btn {
            display: inline-block; 
            background: linear-gradient(135deg, #ff4757, #ff6b81); 
            color: white;
            text-decoration: none; 
            padding: 15px 40px; 
            font-size: 16px; 
            font-weight: 700; 
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4); 
            transition: 0.3s;
        }

        .explore-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 35px rgba(255, 71, 87, 0.6); 
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Sahan <span>Anime</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="series.html">Series</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="hero">
        <div class="hero-box">
            <h1>Welcome to <br><span>Sahan Anime Store</span></h1>
            <a href="gallery.html" class="explore-btn">Explore Gallery</a>
        </div>
    </div>

</body>
</html>
