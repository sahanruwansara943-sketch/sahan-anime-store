<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Sahan Anime Store</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff7979, #ea2027, #06b6d4, #4f46e5);
            background-size: 400% 400%;
            animation: waveAnimation 15s ease infinite;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            padding-top: 20px;
        }

        @keyframes waveAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 15px 4%;
            width: 88%;
            max-width: 1300px;
            margin: 0 auto 30px auto;
            border-radius: 50px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .logo { font-size: 24px; font-weight: 800; }
        .logo span { color: #ff4757; }
        nav ul { display: flex; list-style: none; align-items: center; }
        nav ul li { margin: 0 14px; }
        nav ul li a { color: #ffffff !important; text-decoration: none; font-size: 15px; font-weight: 600; opacity: 0.9; }
        nav ul li a:hover, nav ul li a.active { color: #ff4757 !important; }
        .register-btn { background: #ff4757 !important; padding: 8px 20px; border-radius: 25px; }

        .auth-container { max-width: 1200px; margin: 0 auto; padding: 0 4% 50px 4%; display: flex; flex-direction: column; align-items: center; gap: 35px; }
        
        .login-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 35px;
            padding: 45px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .login-card h2 { font-size: 36px; font-weight: 800; margin-bottom: 8px; }
        .login-card h2 span { color: #ff4757; }
        .welcome-text { font-size: 13px; opacity: 0.6; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { font-size: 12px; font-weight: 700; opacity: 0.8; margin-bottom: 8px; display: block; }
        .form-group input {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 14px 18px; font-size: 14px; color: #ffffff; outline: none;
        }

        .signin-btn {
            background: #ff4757; color: #ffffff; border: none; width: 100%; padding: 14px 0;
            font-size: 15px; font-weight: 700; border-radius: 18px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4); margin-top: 10px; margin-bottom: 20px;
        }
        .signin-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255, 71, 87, 0.6); }
        .redirect-text { font-size: 13px; }
        .redirect-text a { color: #ff4757; text-decoration: none; font-weight: 700; }

        .dashboard-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            padding: 30px 40px; width: 100%; max-width: 800px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .dashboard-card h3 { font-size: 20px; font-weight: 700; margin-bottom: 25px; text-align: left; }
        .dashboard-card h3 span { color: #ff4757; }

        .dashboard-table { width: 100%; border-collapse: collapse; text-align: left; }
        .dashboard-table th { font-size: 12px; font-weight: 700; text-transform: uppercase; padding-bottom: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.15); }
        .th-type { color: #06b6d4; width: 20%; }
        .th-user { color: #ff4757; width: 25%; }
        .th-email { color: #06b6d4; width: 35%; }
        .th-pass { color: #ff4757; width: 20%; }

        .dashboard-table td { padding: 20px 0; font-size: 14px; font-weight: 500; color: #ffffff; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .no-data { text-align: center; opacity: 0.5; padding: 30px 0 !important; }

        @media (max-width: 768px) { nav ul { display: none; } .login-card, .dashboard-card { padding: 30px 20px; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Sahan <span>Anime</span></div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="series.html">Series</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html">Sign In</a></li>
            <li><a href="register.html" class="register-btn">Register</a></li>
        </ul>
    </nav>

    <main class="auth-container">
        <div class="login-card">
            <h2>Sign <span>In</span></h2>
            <p class="welcome-text">Welcome back, Otaku! Login to your account</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="signin-btn">Sign In</button>
            </form>
            <p class="redirect-text">Don't have an account? <a href="register.html">Register</a></p>
        </div>

        <div class="dashboard-card" id="adminDashboard">
            <h3>Admin Dashboard - <span>Registered Users</span></h3>
            <table class="dashboard-table">
                <thead>
                    <tr>
                        <th class="th-type">Type</th>
                        <th class="th-user">Username</th>
                        <th class="th-email">Email</th>
                        <th class="th-pass">Password</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="no-data">Loading users from Firebase cloud...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 🔥 උඹේ නිවැරදිම සිංගප්පූරු සර්වර් Config එක
        const firebaseConfig = {
            apiKey: "AIzaSyBc6Wq-S7viTy7TSp2hUdp1-iAu-OAPeY",
            authDomain: "sahan-anime-store.firebaseapp.com",
            databaseURL: "https://sahan-anime-store-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "sahan-anime-store",
            storageBucket: "sahan-anime-store.firebasestorage.app",
            messagingSenderId: "180534262856",
            appId: "1:180534262856:web:6315761c2d6bebb7b6ac7d",
            measurementId: "G-KS4Y949RZF"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        function loadLiveDashboardData() {
            const tableBody = document.querySelector('.dashboard-table tbody');
            const usersRef = ref(database, 'users');

            onValue(usersRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    tableBody.innerHTML = '';
                    Object.keys(data).forEach(key => {
                        const user = data[key];
                        tableBody.innerHTML += `
                            <tr>
                                <td>${user.type || 'User'}</td>
                                <td style="color: #ff4757; font-weight: 700;">${user.username}</td>
                                <td>${user.email}</td>
                                <td>${user.password}</td>
                            </tr>
                        `;
                    });
                } else {
                    tableBody.innerHTML = '<tr><td colspan="4" class="no-data">No users registered yet in Firebase</td></tr>';
                }
            });
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const emailInput = document.getElementById('email').value;
            const passwordInput = document.getElementById('password').value;
            const dashboard = document.getElementById('adminDashboard');

            const admin1_Email = "sahanruwansara757@gmail.com";
            const admin1_Password = "sahanadmin123";

            const admin2_Email = "mamaemail@gmail.com"; // 👈 මාමගේ Email එක මෙතනට දාන්න
            const admin2_Password = "mamaadmin123"; // 👈 මාමගේ Password එක මෙතනට දන්නා

            if ((emailInput === admin1_Email && passwordInput === admin1_Password) || 
                (emailInput === admin2_Email && passwordInput === admin2_Password)) {
                
                dashboard.style.display = 'block';
                loadLiveDashboardData();
                alert('Welcome back Boss! Live Admin Dashboard Unlocked.');
            } else {
                dashboard.style.display = 'none';
                alert('Login Successful! Redirecting to Member Dashboard...');
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
